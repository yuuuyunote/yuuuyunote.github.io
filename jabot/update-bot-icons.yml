name: Update Bot Icons

on:
  schedule:
    # 毎日 03:00 JST (18:00 UTC) に実行
    - cron: "0 18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-icons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch bot icons from Discord RPC endpoint
        run: node scripts/update-bot-icons.mjs

      - name: Commit changes if bots.json was updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bots.json
          git diff --cached --quiet || git commit -m "chore: update bot icons"
          git push
