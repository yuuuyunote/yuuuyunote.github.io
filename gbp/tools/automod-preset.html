<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMod設定プリセット｜Guide Base + Tools</title>
<link rel="stylesheet" href="/gbp/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="/gbp/index.html" class="brand">
      <span class="brand-mark">G+</span>
      <span>Guide Base + Tools<small>Discord技術情報コミュニティ</small></span>
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="ダークモード切り替え">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>
</header>

<main class="shell">
  <a href="/gbp/index.html" class="back-link back-link-top">← ツール一覧に戻る</a>

  <div class="tool-header">
    <span class="card-tag">サーバー運営</span>
    <h1>AutoMod設定プリセット</h1>
    <p>Discord標準の自動モデレーション機能（AutoMod）で、目的別によく使う設定例をまとめました。「サーバー設定 → モデレーション → AutoMod」から設定できます。</p>
  </div>

  <div class="panel" id="presets-wrap"></div>

  <div class="note mt-16" id="final-note"></div>
</main>

<footer class="site-footer">Guide Base + — Discord技術情報コミュニティ</footer>

<script src="/gbp/js/theme.js"></script>
<script>
var PRESETS = [
  {
    title: '招待リンクのスパム対策',
    desc: '他サーバーへの勧誘・宣伝目的の招待リンク投稿をブロックする。',
    rules: [
      'ルールタイプ：「招待リンク」をブロック',
      '対象：@everyone（信頼済みロールなど一部ロールを除外設定にすることも可能）',
      'アクション：メッセージのブロック＋（必要に応じて）モデレーションログへの通知',
      '自サーバーの公式招待リンクを貼る運用がある場合は、そのチャンネルだけ例外設定にする'
    ]
  },
  {
    title: 'スパムメッセージ対策',
    desc: '同じ内容の連続投稿や、大量メンションなどの荒らし行為を検知する。',
    rules: [
      'ルールタイプ：「スパムメッセージ」をブロック',
      'メンションの急増を検知する設定（一定数以上のメンションを含むメッセージをブロック）も併用推奨',
      'アクション：メッセージのブロック＋一定回数の違反でタイムアウト（Discord標準機能と組み合わせ）'
    ]
  },
  {
    title: '不適切な言葉のフィルタ',
    desc: '独自のNGワードリストに基づいてメッセージをブロックする。',
    rules: [
      'ルールタイプ：「カスタム単語」でNGワードリストを登録',
      '完全一致ではなく部分一致で検知されるため、誤検知しやすい単語は事前にテスト推奨',
      'コミュニティの雰囲気に応じて「不適切な言葉（Discord提供の既定リスト）」も有効化を検討'
    ]
  },
  {
    title: '新規参加者の投稿を制限',
    desc: '参加直後のアカウントによる荒らし・宣伝を抑制する。',
    rules: [
      'ルールタイプ：「メンバーの在籍期間」に基づく制限（一定期間未満のメンバーの投稿を制限）',
      '認証機能（メンバー認証レベル）と組み合わせて、参加直後は投稿不可にする運用も有効',
      'オンボーディング機能でルール同意を必須にしておくと、実質的な参入障壁になる'
    ]
  },
  {
    title: 'キーワードによる自動通知',
    desc: '危険なキーワードを検知した際に、通報せずともモデレーターへ通知する。',
    rules: [
      'ルールタイプ：「カスタム単語」でアクションを「アラートのみ」に設定',
      '通知先チャンネルをモデレーター専用チャンネルに設定しておく',
      'ブロックせずアラートのみにすることで、誤検知時の会話の流れを止めずに済む'
    ]
  }
];

var wrap = document.getElementById('presets-wrap');
PRESETS.forEach(function(p, i){
  if(i > 0){
    var hr = document.createElement('div');
    hr.className = 'preset-divider';
    wrap.appendChild(hr);
  }
  var h3 = document.createElement('h3'); h3.textContent = p.title;
  var desc = document.createElement('p'); desc.className = 'subtext preset-desc'; desc.textContent = p.desc;
  var ul = document.createElement('ul'); ul.className = 'preset-list';
  p.rules.forEach(function(r){
    var li = document.createElement('li'); li.textContent = r;
    ul.appendChild(li);
  });
  wrap.appendChild(h3); wrap.appendChild(desc); wrap.appendChild(ul);
});

document.getElementById('final-note').textContent = 'AutoModは無料で使えるDiscord標準機能です。誤検知が多い場合はルールを緩め、逆に荒らしが増えている時期は一時的に厳しくするなど、状況に応じて調整してください。';
</script>
</body>
</html>
