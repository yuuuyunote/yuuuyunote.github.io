<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チャンネルURLからID抽出｜Guide Base + Tools</title>
<link rel="stylesheet" href="/gbp/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="/gbp/index.html" class="brand">
      <span class="brand-mark">G+</span>
      <span>Guide Base + Tools<small>Discord技術情報コミュニティ</small></span>
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="ダークモード切り替え">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>
</header>

<main class="shell">
  <a href="/gbp/index.html" class="back-link back-link-top">← ツール一覧に戻る</a>

  <div class="tool-header">
    <span class="card-tag">ID・特殊リンク</span>
    <h1>チャンネルURLからID抽出</h1>
    <p>Discordのチャンネル・メッセージ・スレッドのURLを貼り付けると、サーバーID／チャンネルID／メッセージIDに分解します。</p>
  </div>

  <div class="panel">
    <div class="field">
      <label for="url-input">DiscordのURL</label>
      <input type="text" id="url-input" placeholder="例：https://discord.com/channels/123456789012345678/234567890123456789/345678901234567890">
    </div>
    <div class="note hidden" id="url-warning">URLの形式が正しくありません。「discord.com/channels/…」または「discord.com/channels/@me/…」の形式で貼り付けてください。</div>
  </div>

  <div class="panel hidden" id="url-results">
    <h2>抽出結果</h2>
    <div class="tbl-wrap"><table class="ref-table" id="url-table"></table></div>
  </div>
</main>

<footer class="site-footer">Guide Base + — Discord技術情報コミュニティ</footer>

<script src="/gbp/js/theme.js"></script>
<script src="/gbp/js/copy.js"></script>
<script>
var input = document.getElementById('url-input');
var warning = document.getElementById('url-warning');
var resultsPanel = document.getElementById('url-results');
var table = document.getElementById('url-table');

// 対応パターン:
// /channels/{guildId}/{channelId}/{messageId}
// /channels/{guildId}/{channelId}
// /channels/@me/{channelId}/{messageId}  (DM)
// /channels/@me/{channelId}              (DM)
var RE = /discord(?:app)?\.com\/channels\/(@me|[0-9]{15,20})\/([0-9]{15,20})(?:\/([0-9]{15,20}))?/;

function renderRow(tbody, label, value){
  var tr = document.createElement('tr');
  var tdLabel = document.createElement('td'); tdLabel.textContent = label;
  var tdVal = document.createElement('td');
  var code = document.createElement('code');
  code.id = 'urlid-' + label.replace(/[^a-zA-Z0-9]/g,'');
  code.textContent = value;
  tdVal.appendChild(code);
  var tdBtn = document.createElement('td');
  var btn = document.createElement('button');
  btn.className = 'btn btn-sm'; btn.textContent = 'コピー';
  btn.setAttribute('data-copy-target', '#' + code.id);
  tdBtn.appendChild(btn);
  tr.appendChild(tdLabel); tr.appendChild(tdVal); tr.appendChild(tdBtn);
  tbody.appendChild(tr);
}

function render(){
  var v = input.value.trim();
  if(!v){ resultsPanel.classList.add('hidden'); warning.classList.add('hidden'); return; }

  var m = v.match(RE);
  if(!m){ resultsPanel.classList.add('hidden'); warning.classList.remove('hidden'); return; }
  warning.classList.add('hidden');
  resultsPanel.classList.remove('hidden');

  var guildId = m[1], channelId = m[2], messageId = m[3];

  table.innerHTML = '';
  var thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>種類</th><th>値</th><th></th></tr>';
  var tbody = document.createElement('tbody');

  if(guildId === '@me'){
    renderRow(tbody, 'タイプ', 'ダイレクトメッセージ（DM）');
  } else {
    renderRow(tbody, 'サーバーID', guildId);
  }
  renderRow(tbody, 'チャンネルID', channelId);
  if(messageId) renderRow(tbody, 'メッセージID', messageId);

  table.appendChild(thead);
  table.appendChild(tbody);
}

input.addEventListener('input', render);
</script>
</body>
</html>
