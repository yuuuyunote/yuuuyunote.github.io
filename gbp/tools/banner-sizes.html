<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バナー/アイコン推奨サイズ一覧｜Guide Base + Tools</title>
<link rel="stylesheet" href="/gbp/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="/gbp/index.html" class="brand">
      <span class="brand-mark">G+</span>
      <span>Guide Base + Tools<small>Discord技術情報コミュニティ</small></span>
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="ダークモード切り替え">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>
</header>

<main class="shell">
  <a href="/gbp/index.html" class="back-link back-link-top">← ツール一覧に戻る</a>

  <div class="tool-header">
    <span class="card-tag">リファレンス</span>
    <h1>バナー/アイコン推奨サイズ一覧</h1>
    <p>サーバーアイコン・バナー・絵文字など、Discordでよく使う画像素材の推奨サイズと制限をまとめました。</p>
  </div>

  <div class="panel">
    <div class="tbl-wrap"><table class="ref-table" id="size-table"></table></div>
    <div class="note">数値は一般的な目安です。ブーストレベルによる解放条件やDiscord側の仕様変更で数値が前後することがあるため、実際にアップロードする前にサーバー設定画面の案内も確認してください。</div>
  </div>
</main>

<footer class="site-footer">Guide Base + — Discord技術情報コミュニティ</footer>

<script src="/gbp/js/theme.js"></script>
<script>
var ROWS = [
  ['サーバーアイコン', '512×512px（正方形）', '10MB程度', '円形に切り取られて表示されるため、四隅の余白を意識する。'],
  ['サーバーバナー', '1920×1080px（16:9）※最小960×540px', '10MB程度', 'ブーストレベル2以上で解放。アニメーション（GIF）はレベル3以上。'],
  ['招待画面の背景（スプラッシュ）', '1920×1080px（16:9）', '10MB程度', 'ブーストレベル1以上で解放。'],
  ['サーバーガイドのバナー', '1920×480px（4:1程度）', '10MB程度', 'オンボーディングの「サーバーガイド」上部に表示。'],
  ['イベントのカバー画像', '800×320px（2:1〜2.5:1程度）', '10MB程度', '上下がトリミングされるため、重要な情報は中央帯に収める。'],
  ['カスタム絵文字', '128×128px', '256KB以下', 'アニメーション絵文字はGIF、静止画はPNG推奨。'],
  ['スタンプ（ステッカー）', '320×320px', '512KB以下', '背景を透過にし、被写体を中央に大きく配置する。'],
  ['ロールアイコン', '64×64px', '256KB程度', 'ブーストレベル2以上で解放。シンプルな図形が視認性が高い。'],
  ['ユーザーアバター', '512×512px推奨（最小128×128px）', '10MB程度', '円形に切り取られるため四隅は隠れる想定で作る。'],
  ['プロフィールバナー', '600×240px程度', '10MB程度', 'Nitro契約者のみ設定可能。']
];

var table = document.getElementById('size-table');
var thead = document.createElement('thead');
thead.innerHTML = '<tr><th>素材</th><th>推奨サイズ</th><th>ファイルサイズの目安</th><th>補足</th></tr>';
var tbody = document.createElement('tbody');
ROWS.forEach(function(r){
  var tr = document.createElement('tr');
  r.forEach(function(c){ var td = document.createElement('td'); td.textContent = c; tr.appendChild(td); });
  tbody.appendChild(tr);
});
table.appendChild(thead);
table.appendChild(tbody);
</script>
</body>
</html>
