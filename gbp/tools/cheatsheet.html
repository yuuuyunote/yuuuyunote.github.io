<script src="/gbp/js/theme.js"></script>
<script src="/gbp/js/copy.js"></script>
<script>
function buildTable(tableId, rows){
  var body = rows.map(function(r, i){
    var cellId = tableId+'-'+i;
    return '<tr><td>'+r[0]+'</td><td><code id="'+cellId+'">'+r[1].replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code></td>' +
      '<td><button class="btn btn-sm" data-copy-target="#'+cellId+'">コピー</button></td></tr>';
  }).join('');
  document.getElementById(tableId).innerHTML = '<thead><tr><th>用途</th><th>記法</th><th></th></tr></thead><tbody>'+body+'</tbody>';
}
// data-copy-target reads textContent — set via JS to avoid HTML-escaping issues
function buildTableRaw(tableId, rows){
  var tbody = document.createElement('tbody');
  rows.forEach(function(r, i){
    var tr = document.createElement('tr');
    var td1 = document.createElement('td'); td1.textContent = r[0];
    var td2 = document.createElement('td');
    var code = document.createElement('code'); code.id = tableId+'-'+i; code.textContent = r[1];
    td2.appendChild(code);
    var td3 = document.createElement('td');
    var btn = document.createElement('button'); btn.className='btn btn-sm'; btn.textContent='コピー';
    btn.setAttribute('data-copy-target', '#'+tableId+'-'+i);
    td3.appendChild(btn);
    tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3);
    tbody.appendChild(tr);
  });
  var table = document.getElementById(tableId);
  table.innerHTML = '<thead><tr><th>用途</th><th>記法</th><th></th></tr></thead>';
  table.appendChild(tbody);
}

buildTableRaw('deco-table', [
  ['太字', '**テキスト**'],
  ['斜体', '*テキスト*'],
  ['下線', '__テキスト__'],
  ['取り消し線', '~~テキスト~~'],
  ['スポイラー（ネタバレ）', '||テキスト||'],
  ['引用（1行）', '> テキスト'],
  ['引用（複数行）', '>>> テキスト'],
  ['インラインコード', '`テキスト`'],
  ['見出し(大/中/小)', '# / ## / ###'],
  ['箇条書き', '- 項目'],
  ['番号付きリスト', '1. 項目'],
  ['マスクリンク', '[表示名](https://example.com)']
]);

buildTableRaw('mention-table', [
  ['全員に通知', '@everyone'],
  ['オンラインメンバーに通知', '@here'],
  ['ユーザーメンション', '<@ユーザーID>'],
  ['ロールメンション', '<@&ロールID>'],
  ['チャンネルリンク', '<#チャンネルID>'],
  ['スラッシュコマンドリンク', '</コマンド名:コマンドID>']
]);

buildTableRaw('lang-table', [
  ['プレーンテキスト', '```text'],
  ['JavaScript', '```js'],
  ['Python', '```python'],
  ['JSON', '```json'],
  ['YAML', '```yaml'],
  ['ANSIカラー', '```ansi'],
  ['diff（差分表示）', '```diff'],
  ['HTML', '```html'],
  ['CSS', '```css'],
  ['SQL', '```sql']
]);
</script>
