<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マークダウンコピー｜Guide Base + Tools</title>
<link rel="stylesheet" href="/gbp/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="/gbp/index.html" class="brand">
      <span class="brand-mark">G+</span>
      <span>Guide Base + Tools<small>Discord技術情報コミュニティ</small></span>
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="ダークモード切り替え">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>
</header>

<main class="shell">
  <a href="/gbp/index.html" class="back-link back-link-top">← ツール一覧に戻る</a>

  <div class="tool-header">
    <span class="card-tag">テキスト装飾</span>
    <h1>マークダウンコピー</h1>
    <p>選択した部分にボタンでマークダウン記法を適用し、Discordにそのまま貼り付けられる形でコピーできます。</p>
  </div>

  <div class="panel">
    <h2><span class="step">01</span>文章を入力・選択して装飾する</h2>
    <p class="subtext">装飾したい部分を選択してからボタンを押してください。選択せずに押すと、その記法のサンプルが挿入されます。</p>
    <textarea id="md-editor" class="textarea-md">ここに文章を入力してください</textarea>
    <div class="btn-group">
      <button class="btn" data-md="bold">太字</button>
      <button class="btn" data-md="italic">斜体</button>
      <button class="btn" data-md="underline">下線</button>
      <button class="btn" data-md="strike">取り消し線</button>
      <button class="btn" data-md="spoiler">スポイラー</button>
      <button class="btn" data-md="code">インラインコード</button>
      <button class="btn" data-md="codeblock">コードブロック</button>
      <button class="btn" data-md="quote">引用</button>
      <button class="btn" data-md="h1">見出し(大)</button>
      <button class="btn" data-md="h2">見出し(中)</button>
      <button class="btn" data-md="h3">見出し(小)</button>
      <button class="btn" data-md="bullet">箇条書き</button>
      <button class="btn" data-md="masked-link">リンク（表示テキスト付き）</button>
    </div>
  </div>

  <div class="panel">
    <h2><span class="step">02</span>結果をコピー</h2>
    <div class="copy-row">
      <div class="output-box" id="md-output"></div>
      <button class="btn btn-primary" data-copy-target="#md-editor">コピー</button>
    </div>
    <div class="note">プレビューはそのまま <code>#md-editor</code> の内容です。Discordの入力欄に貼り付ければ記法が反映されます。</div>
  </div>
</main>

<footer class="site-footer">Guide Base + — Discord技術情報コミュニティ</footer>

<script src="/gbp/js/theme.js"></script>
<script src="/gbp/js/copy.js"></script>
<script>
var ta = document.getElementById('md-editor');
var out = document.getElementById('md-output');

var WRAPS = {
  bold: ['**','**','太字'],
  italic: ['*','*','斜体'],
  underline: ['__','__','下線'],
  strike: ['~~','~~','取り消し線'],
  spoiler: ['||','||','ネタバレ'],
  code: ['`','`','コード'],
  quote: ['> ','', '引用文'],
  h1: ['# ','', '見出し'],
  h2: ['## ','', '見出し'],
  h3: ['### ','', '見出し'],
  bullet: ['- ','', '項目']
};

function applyWrap(key){
  var start = ta.selectionStart, end = ta.selectionEnd;
  var val = ta.value;
  var selected = val.slice(start, end);

  if(key === 'codeblock'){
    var block = selected || 'コード';
    var insert = '```\n' + block + '\n```';
    ta.value = val.slice(0,start) + insert + val.slice(end);
    ta.focus(); ta.selectionStart = start+4; ta.selectionEnd = start+4+block.length;
    render(); return;
  }
  if(key === 'masked-link'){
    var label = selected || 'リンク';
    var insert = '[' + label + '](https://example.com)';
    ta.value = val.slice(0,start) + insert + val.slice(end);
    ta.focus();
    render(); return;
  }

  var pair = WRAPS[key];
  var pre = pair[0], post = pair[1], placeholder = pair[2];
  var body = selected || placeholder;
  var insert = pre + body + post;
  ta.value = val.slice(0,start) + insert + val.slice(end);
  var caretStart = start + pre.length;
  ta.focus(); ta.selectionStart = caretStart; ta.selectionEnd = caretStart + body.length;
  render();
}

document.querySelectorAll('[data-md]').forEach(function(btn){
  btn.addEventListener('click', function(){ applyWrap(btn.getAttribute('data-md')); });
});

function render(){ out.textContent = ta.value; }
ta.addEventListener('input', render);
render();
</script>
</body>
</html>
