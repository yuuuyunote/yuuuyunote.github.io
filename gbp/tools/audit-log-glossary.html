<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>監査ログの見方｜Guide Base + Tools</title>
<link rel="stylesheet" href="/gbp/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="/gbp/index.html" class="brand">
      <span class="brand-mark">G+</span>
      <span>Guide Base + Tools<small>Discord技術情報コミュニティ</small></span>
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="ダークモード切り替え">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>
</header>

<main class="shell">
  <a href="/gbp/index.html" class="back-link back-link-top">← ツール一覧に戻る</a>

  <div class="tool-header">
    <span class="card-tag">リファレンス</span>
    <h1>監査ログの見方</h1>
    <p>「サーバー設定 → 監査ログ」に表示される操作項目の意味をまとめました。カテゴリの絞り込みと組み合わせて使うと、目的の操作を探しやすくなります。</p>
  </div>

  <div class="panel">
    <h2>サーバー・チャンネル関連</h2>
    <div class="tbl-wrap"><table class="ref-table" id="tbl-server"></table></div>
  </div>

  <div class="panel">
    <h2>メンバー・ロール関連</h2>
    <div class="tbl-wrap"><table class="ref-table" id="tbl-member"></table></div>
  </div>

  <div class="panel">
    <h2>メッセージ・モデレーション関連</h2>
    <div class="tbl-wrap"><table class="ref-table" id="tbl-message"></table></div>
  </div>

  <div class="panel">
    <h2>Webhook・連携関連</h2>
    <div class="tbl-wrap"><table class="ref-table" id="tbl-integration"></table></div>
  </div>
</main>

<footer class="site-footer">Guide Base + — Discord技術情報コミュニティ</footer>

<script src="/gbp/js/theme.js"></script>
<script>
function buildTable(id, rows){
  var table = document.getElementById(id);
  var thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>操作項目</th><th>意味</th></tr>';
  var tbody = document.createElement('tbody');
  rows.forEach(function(r){
    var tr = document.createElement('tr');
    r.forEach(function(c){ var td = document.createElement('td'); td.textContent = c; tr.appendChild(td); });
    tbody.appendChild(tr);
  });
  table.appendChild(thead);
  table.appendChild(tbody);
}

buildTable('tbl-server', [
  ['サーバー概要を更新', 'サーバー名・アイコン・地域設定などの基本情報が変更された。'],
  ['チャンネルを作成', '新しいチャンネル（テキスト/音声/フォーラム等）が作成された。'],
  ['チャンネルを更新', 'チャンネル名・トピック・権限設定などが変更された。'],
  ['チャンネルを削除', 'チャンネルが削除された。'],
  ['スレッドを作成/削除', 'スレッドが作成または削除された。']
]);

buildTable('tbl-member', [
  ['メンバーをキック', 'メンバーがサーバーから追放された（再参加は可能）。'],
  ['メンバーをBAN', 'メンバーがサーバーから永久追放され、再参加できない状態にされた。'],
  ['メンバーのBANを解除', 'BANが解除された。'],
  ['メンバーを更新', 'ニックネームの変更やロールの付与/剥奪などが行われた。'],
  ['メンバーをタイムアウト', '一定期間、発言や反応ができない状態に設定された。'],
  ['ロールを作成/更新/削除', 'ロールの新規作成・権限や色の変更・削除が行われた。']
]);

buildTable('tbl-message', [
  ['メッセージを削除', 'モデレーターや自動化ツールによってメッセージが削除された（本人による削除はここに残らない）。'],
  ['メッセージを一括削除', '複数のメッセージがまとめて削除された。'],
  ['メッセージをピン留め/解除', 'メッセージがピン留めされた、または解除された。'],
  ['AutoModルールを作成/更新/削除', '自動モデレーションのルールが変更された。'],
  ['AutoModによりメッセージをブロック', 'AutoModのルールに該当し、投稿が自動的にブロックされた。']
]);

buildTable('tbl-integration', [
  ['Webhookを作成/更新/削除', 'Webhook連携が追加・変更・削除された。'],
  ['Botを追加', '新しいBotがサーバーに招待された。'],
  ['連携（Integration）を更新/削除', '外部サービス連携（Twitch通知など）の設定が変更・削除された。'],
  ['招待リンクを作成/削除', '招待リンクが発行・削除された。']
]);
</script>
</body>
</html>
