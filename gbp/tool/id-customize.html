<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマホ非対応リンクコピー｜Guide Base + Tools</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="../index.html" class="brand">
      <span class="brand-mark">G+</span>
      <span>Guide Base + Tools<small>Discord技術情報コミュニティ</small></span>
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="ダークモード切り替え">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>
</header>

<main class="shell">
  <a href="../index.html" class="back-link back-link-top">← ツール一覧に戻る</a>

  <div class="tool-header">
    <span class="card-tag">ID・特殊リンク</span>
    <h1>スマホ非対応リンクコピー</h1>
    <p><code>&lt;id:customize&gt;</code> のような公式リンクタグは、PC版ではチャンネル一覧を右クリックすると出てきますが、スマホアプリのUIからはコピーできません。ここから直接コピーしてください。</p>
  </div>

  <div class="panel">
    <div class="tbl-wrap">
      <table class="ref-table" id="link-table"></table>
    </div>
    <div class="note">これらはサーバーごとに機能が有効になっている場合のみ実際にリンクとして機能します（例：ロール取得チャンネルが設定されていない場合、<code>&lt;id:customize&gt;</code> は動作しません）。</div>
  </div>
</main>

<footer class="site-footer">Guide Base + — Discord技術情報コミュニティ</footer>

<script src="../js/theme.js"></script>
<script src="../js/copy.js"></script>
<script>
var TAGS = [
  {tag:'<id:customize>', desc:'ロール取得（チャンネル/プロフィールのカスタマイズ）画面を開く'},
  {tag:'<id:guide>', desc:'サーバーガイドを開く'},
  {tag:'<id:browse>', desc:'チャンネル一覧（閲覧）を開く'},
  {tag:'<id:support>', desc:'サポートチャンネルを開く（設定されている場合）'},
  {tag:'<id:home>', desc:'サーバーのホーム画面を開く'},
  {tag:'<id:linked-roles>', desc:'連携ロールの取得画面を開く'}
];

var table = document.getElementById('link-table');
var rows = TAGS.map(function(t, i){
  var cellId = 'link-'+i;
  return '<tr><td><code id="'+cellId+'">'+t.tag+'</code></td><td>'+t.desc+'</td>' +
    '<td><button class="btn btn-sm" data-copy-target="#'+cellId+'">コピー</button></td></tr>';
}).join('');
table.innerHTML = '<thead><tr><th>タグ</th><th>説明</th><th></th></tr></thead><tbody>'+rows+'</tbody>';
</script>
</body>
</html>
