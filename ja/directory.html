<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot図鑑 | Japan Discord Bot Hub</title>
<meta name="description" content="日本製Discord Bot応援コミュニティが公認する加盟Botの図鑑。カテゴリやタグで絞り込み、キーワード検索で目的のBotをすぐに見つけられます。">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          blurple: {
            DEFAULT: '#5865F2',
            dark: '#4752C4',
            light: '#EEF0FE'
          },
          ink: '#1E293B',
          offwhite: '#F8F9FA'
        },
        fontFamily: {
          sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
        }
      }
    }
  }
</script>

<style>
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    color: #1E293B;
    background-color: #FFFFFF;
  }
  .jp { font-family: 'Noto Sans JP', 'Inter', sans-serif; }
  .floating-header {
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .card-hover { transition: transform 0.25s ease, box-shadow 0.25s ease; }
  .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(30, 41, 59, 0.12); }
  .btn-pill { transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease; }
  .btn-pill:hover { transform: translateY(-2px); }
  ::selection { background-color: #5865F2; color: #fff; }

  .tab-pill {
    transition: background-color 0.15s ease, color 0.15s ease;
  }
  .tab-pill[data-active="true"] {
    background-color: #5865F2;
    color: #fff;
  }
  .tag-pill[data-active="true"] {
    background-color: #1E293B;
    color: #fff;
    border-color: #1E293B;
  }

  /* Modal */
  #modal-backdrop {
    background: rgba(30, 41, 59, 0.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal-enter {
    animation: modalIn 0.2s ease-out forwards;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .card-hover, .btn-pill, .modal-enter { transition: none !important; animation: none !important; }
    .card-hover:hover, .btn-pill:hover { transform: none !important; }
  }

  a:focus-visible, button:focus-visible {
    outline: 2px solid #5865F2;
    outline-offset: 2px;
  }
</style>
</head>
<body class="bg-white text-[#1E293B] antialiased">

<!-- ===================== Floating Header ===================== -->
<header class="fixed top-3 left-1/2 -translate-x-1/2 z-40 w-[94%] max-w-5xl">
  <div class="floating-header rounded-full shadow-sm border border-slate-100 px-4 sm:px-6 py-2.5 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 shrink-0">
      <span class="w-8 h-8 rounded-full bg-blurple flex items-center justify-center">
        <i data-lucide="bot" class="w-4 h-4 text-white"></i>
      </span>
      <span class="font-extrabold text-sm sm:text-base tracking-tight hidden xs:inline">Japan Discord Bot Hub</span>
    </a>

    <nav class="hidden md:flex items-center gap-1 text-sm font-medium">
      <a href="index.html" class="px-4 py-2 rounded-full hover:bg-slate-100 transition-colors">トップ</a>
      <a href="directory.html" class="px-4 py-2 rounded-full bg-slate-100">Bot図鑑</a>
      <a href="https://note.com/" target="_blank" rel="noopener" class="px-4 py-2 rounded-full hover:bg-slate-100 transition-colors">公式note</a>
      <a href="https://discord.gg/" target="_blank" rel="noopener" class="px-4 py-2 rounded-full hover:bg-slate-100 transition-colors">サポートDiscord</a>
    </nav>

    <a href="https://discord.gg/" target="_blank" rel="noopener" class="btn-pill inline-flex items-center gap-1.5 bg-blurple text-white text-xs sm:text-sm font-semibold px-4 sm:px-5 py-2 rounded-full shadow-sm shadow-blurple/30 shrink-0">
      サポート
      <i data-lucide="message-circle" class="w-3.5 h-3.5"></i>
    </a>
  </div>
</header>

<main class="pt-32 pb-24">

  <!-- ===================== Page intro ===================== -->
  <section class="max-w-3xl mx-auto px-6 text-center mb-12">
    <span class="jp inline-block text-xs font-bold tracking-widest text-blurple bg-blurple-light px-4 py-1.5 rounded-full">Directory</span>
    <h1 class="jp mt-4 text-3xl sm:text-4xl font-black tracking-tight">Bot図鑑</h1>
    <p class="jp mt-3 text-slate-500">公式公認バッジ（<i data-lucide="badge-check" class="inline w-4 h-4 text-blurple align-[-3px]"></i>）付きの加盟Botだけを掲載しています。</p>
  </section>

  <!-- ===================== 検索＆フィルターエリア ===================== -->
  <section class="max-w-5xl mx-auto px-6 mb-10">
    <div class="bg-offwhite rounded-3xl p-5 sm:p-6 border border-slate-100">

      <!-- Search -->
      <div class="relative mb-5">
        <i data-lucide="search" class="w-4.5 h-4.5 text-slate-400 absolute left-5 top-1/2 -translate-y-1/2" style="width:18px;height:18px;"></i>
        <input
          id="search-input"
          type="text"
          placeholder="Bot名やキーワードで検索…"
          class="jp w-full bg-white border border-slate-200 rounded-full pl-12 pr-5 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-blurple/40 focus:border-blurple placeholder:text-slate-400"
        >
      </div>

      <!-- Category tabs -->
      <div id="category-tabs" class="jp flex flex-wrap gap-2 mb-5">
        <button data-category="すべて" data-active="true" class="tab-pill category-tab px-4 py-2 rounded-full text-xs sm:text-sm font-semibold bg-white border border-slate-200 text-slate-500">すべて</button>
        <button data-category="サーバー管理" class="tab-pill category-tab px-4 py-2 rounded-full text-xs sm:text-sm font-semibold bg-white border border-slate-200 text-slate-500">サーバー管理</button>
        <button data-category="エンタメ・ゲーム" class="tab-pill category-tab px-4 py-2 rounded-full text-xs sm:text-sm font-semibold bg-white border border-slate-200 text-slate-500">エンタメ・ゲーム</button>
        <button data-category="音楽・読み上げ" class="tab-pill category-tab px-4 py-2 rounded-full text-xs sm:text-sm font-semibold bg-white border border-slate-200 text-slate-500">音楽・読み上げ</button>
        <button data-category="ユーティリティ" class="tab-pill category-tab px-4 py-2 rounded-full text-xs sm:text-sm font-semibold bg-white border border-slate-200 text-slate-500">ユーティリティ</button>
      </div>

      <!-- Tag filters -->
      <div>
        <p class="jp text-xs font-semibold text-slate-400 mb-2.5">特徴タグで絞り込み（複数選択可）</p>
        <div id="tag-filters" class="jp flex flex-wrap gap-2">
          <!-- injected by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== Result count ===================== -->
  <section class="max-w-5xl mx-auto px-6 mb-4">
    <p id="result-count" class="jp text-sm text-slate-400"></p>
  </section>

  <!-- ===================== Bot card grid ===================== -->
  <section class="max-w-5xl mx-auto px-6">
    <div id="bot-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <!-- injected by JS -->
    </div>
    <p id="empty-state" class="hidden jp text-center text-slate-400 text-sm py-16">条件に一致するBotが見つかりませんでした。</p>
  </section>

</main>

<!-- ===================== フッター ===================== -->
<footer class="border-t border-slate-100 bg-offwhite">
  <div class="max-w-6xl mx-auto px-6 py-10 flex flex-col sm:flex-row items-center justify-between gap-4">
    <div class="flex items-center gap-2">
      <span class="w-7 h-7 rounded-full bg-blurple flex items-center justify-center">
        <i data-lucide="bot" class="w-3.5 h-3.5 text-white"></i>
      </span>
      <span class="font-bold text-sm">Japan Discord Bot Hub</span>
    </div>
    <p class="jp text-xs text-slate-400">&copy; 2026 Japan Discord Bot Hub. All rights reserved.</p>
  </div>
</footer>

<!-- ===================== Modal ===================== -->
<div id="modal-backdrop" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div id="modal-panel" class="modal-enter bg-white rounded-3xl max-w-lg w-full max-h-[85vh] overflow-y-auto shadow-2xl">
    <!-- injected by JS -->
  </div>
</div>

<script>
  lucide.createIcons();

  let allBots = [];
  let activeCategory = 'すべて';
  let activeTags = new Set();
  let searchQuery = '';

  const categoryColor = {
    'サーバー管理': 'bg-blurple-light text-blurple',
    'エンタメ・ゲーム': 'bg-rose-50 text-rose-500',
    '音楽・読み上げ': 'bg-violet-50 text-violet-500',
    'ユーティリティ': 'bg-emerald-50 text-emerald-600'
  };

  // ---------- Fetch data ----------
  fetch('bots.json')
    .then(res => res.json())
    .then(data => {
      allBots = data;
      buildTagFilters(data);
      render();
    })
    .catch(() => {
      document.getElementById('bot-grid').innerHTML =
        `<p class="jp col-span-full text-center text-sm text-slate-400 py-16">Botデータの読み込みに失敗しました。</p>`;
    });

  function buildTagFilters(bots) {
    const tagSet = new Set();
    bots.forEach(b => b.tags.forEach(t => tagSet.add(t)));
    const container = document.getElementById('tag-filters');
    container.innerHTML = [...tagSet].map(tag => `
      <button data-tag="${tag}" class="tag-pill px-3.5 py-1.5 rounded-full text-xs font-medium bg-white border border-slate-200 text-slate-500">${tag}</button>
    `).join('');
    container.querySelectorAll('.tag-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.tag;
        if (activeTags.has(tag)) {
          activeTags.delete(tag);
          btn.removeAttribute('data-active');
        } else {
          activeTags.add(tag);
          btn.setAttribute('data-active', 'true');
        }
        render();
      });
    });
  }

  // ---------- Category tabs ----------
  document.querySelectorAll('.category-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.category-tab').forEach(b => b.removeAttribute('data-active'));
      btn.setAttribute('data-active', 'true');
      activeCategory = btn.dataset.category;
      render();
    });
  });

  // ---------- Search ----------
  document.getElementById('search-input').addEventListener('input', (e) => {
    searchQuery = e.target.value.trim().toLowerCase();
    render();
  });

  // ---------- Filtering + rendering ----------
  function getFiltered() {
    return allBots.filter(bot => {
      const matchCategory = activeCategory === 'すべて' || bot.category === activeCategory;
      const matchTags = activeTags.size === 0 || [...activeTags].every(t => bot.tags.includes(t));
      const haystack = (bot.name + ' ' + bot.shortDesc + ' ' + bot.tags.join(' ')).toLowerCase();
      const matchSearch = searchQuery === '' || haystack.includes(searchQuery);
      return matchCategory && matchTags && matchSearch;
    });
  }

  function render() {
    const filtered = getFiltered();
    const grid = document.getElementById('bot-grid');
    const empty = document.getElementById('empty-state');
    const count = document.getElementById('result-count');

    count.textContent = `${filtered.length}件のBotが見つかりました`;

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    grid.innerHTML = filtered.map(bot => `
      <div class="card-hover bg-white rounded-3xl p-6 border border-slate-100 shadow-sm flex flex-col">
        <div class="flex items-center gap-3 mb-4">
          <span class="w-12 h-12 rounded-full ${bot.iconBg} flex items-center justify-center shrink-0">
            <i data-lucide="${bot.icon}" class="w-6 h-6 text-white"></i>
          </span>
          <div class="min-w-0">
            <div class="flex items-center gap-1.5">
              <h3 class="font-bold truncate">${bot.name}</h3>
              <i data-lucide="badge-check" class="w-4 h-4 text-blurple shrink-0"></i>
            </div>
            <span class="jp inline-block mt-1 text-[11px] font-semibold px-2.5 py-0.5 rounded-full ${categoryColor[bot.category] || 'bg-slate-100 text-slate-500'}">${bot.category}</span>
          </div>
        </div>
        <p class="jp text-sm text-slate-500 leading-relaxed mb-4 flex-1">${bot.shortDesc}</p>
        <div class="flex flex-wrap gap-1.5 mb-5">
          ${bot.tags.map(t => `<span class="jp text-[11px] font-medium text-slate-500 bg-slate-100 px-2.5 py-1 rounded-full">${t}</span>`).join('')}
        </div>
        <div class="flex items-center gap-2">
          <button data-id="${bot.id}" class="detail-btn flex-1 jp text-xs sm:text-sm font-semibold border border-slate-200 rounded-full py-2.5 hover:bg-slate-50 transition-colors">詳細を見る</button>
          <a href="${bot.inviteUrl}" target="_blank" rel="noopener" class="flex-1 jp text-xs sm:text-sm font-semibold text-center bg-blurple text-white rounded-full py-2.5 hover:bg-blurple-dark transition-colors">Discordに追加 ↗</a>
        </div>
      </div>
    `).join('');

    lucide.createIcons();

    grid.querySelectorAll('.detail-btn').forEach(btn => {
      btn.addEventListener('click', () => openModal(btn.dataset.id));
    });
  }

  // ---------- Modal ----------
  const backdrop = document.getElementById('modal-backdrop');
  const panel = document.getElementById('modal-panel');

  function openModal(id) {
    const bot = allBots.find(b => b.id === id);
    if (!bot) return;

    panel.innerHTML = `
      <div class="relative">
        <div class="h-28 ${bot.iconBg} flex items-center justify-center rounded-t-3xl">
          <span class="w-16 h-16 rounded-full bg-white/20 flex items-center justify-center">
            <i data-lucide="${bot.icon}" class="w-8 h-8 text-white"></i>
          </span>
        </div>
        <button id="modal-close" aria-label="閉じる" class="absolute top-4 right-4 w-9 h-9 rounded-full bg-white/90 flex items-center justify-center shadow-sm hover:bg-white transition-colors">
          <i data-lucide="x" class="w-4.5 h-4.5" style="width:18px;height:18px;"></i>
        </button>
      </div>

      <div class="p-7">
        <div class="flex items-center gap-2 mb-2">
          <h2 class="jp text-xl font-black">${bot.name}</h2>
          <span class="flex items-center gap-1 jp text-[11px] font-bold text-blurple bg-blurple-light px-2.5 py-1 rounded-full">
            <i data-lucide="badge-check" class="w-3.5 h-3.5"></i>
            公式公認
          </span>
        </div>
        <span class="jp inline-block text-[11px] font-semibold px-2.5 py-0.5 rounded-full ${categoryColor[bot.category] || 'bg-slate-100 text-slate-500'} mb-4">${bot.category}</span>

        <p class="jp text-sm text-slate-500 leading-relaxed mb-5">${bot.fullDesc}</p>

        <div class="flex flex-wrap gap-1.5 mb-7">
          ${bot.tags.map(t => `<span class="jp text-[11px] font-medium text-slate-500 bg-slate-100 px-2.5 py-1 rounded-full">${t}</span>`).join('')}
        </div>

        <div class="flex flex-col sm:flex-row gap-2.5">
          <a href="${bot.inviteUrl}" target="_blank" rel="noopener" class="btn-pill flex-1 text-center jp text-sm font-semibold bg-blurple text-white rounded-full py-3 shadow-sm shadow-blurple/30">Discordに追加 ↗</a>
          <a href="${bot.supportUrl}" target="_blank" rel="noopener" class="btn-pill flex-1 text-center jp text-sm font-semibold border border-slate-200 rounded-full py-3 hover:bg-slate-50 transition-colors">サポートDiscordへ</a>
        </div>
      </div>
    `;

    backdrop.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    lucide.createIcons();

    document.getElementById('modal-close').addEventListener('click', closeModal);
  }

  function closeModal() {
    backdrop.classList.add('hidden');
    document.body.style.overflow = '';
  }

  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
</script>

</body>
</html>
