<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>note記事検索 — ゆううゆ Portfolio</title>
  <meta name="description" content="ゆううゆのnote記事(全件)をキーワードで検索できる特設ページです。" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="script.js" defer></script>

  <style>
    /* ─────────────── search.html 専用スタイル ─────────────── */
    .search-wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      margin-bottom: 20px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-box i.fa-magnifying-glass {
      color: var(--text-sub);
      font-size: 15px;
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      color: var(--text);
    }

    .search-input::placeholder { color: var(--text-sub); }

    .search-clear {
      border: none;
      background: none;
      color: var(--text-sub);
      cursor: pointer;
      font-size: 13px;
      padding: 4px;
      display: none;
      transition: color var(--transition);
    }

    .search-clear:hover { color: var(--accent); }
    .search-clear.visible { display: inline-flex; }

    .search-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .search-count {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-sub);
      letter-spacing: 0.02em;
    }

    .search-count strong {
      color: var(--accent);
      font-weight: 500;
    }

    .search-empty {
      text-align: center;
      padding: 64px 20px;
      color: var(--text-sub);
      font-size: 14px;
    }

    .search-empty i {
      display: block;
      font-size: 28px;
      margin-bottom: 16px;
      color: var(--border);
    }

    .note-loading {
      text-align: center;
      padding: 48px 0;
      color: var(--text-sub);
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .search-box { padding: 12px 16px; }
    }

    /* ─────────────── 有料記事の区別用トークン ─────────────── */
    :root {
      --premium:       #a3791f;
      --premium-light: #fbf1d8;
      --premium-glow:  rgba(163, 121, 31, 0.18);
    }
    [data-theme="dark"] {
      --premium:       #e0b753;
      --premium-light: #2e2410;
      --premium-glow:  rgba(224, 183, 83, 0.18);
    }

    /* フィルターチップ */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-chip {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-sub);
      cursor: pointer;
      transition: all var(--transition);
    }

    .filter-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .filter-chip[data-filter="premium"].active {
      background: var(--premium);
      border-color: var(--premium);
      color: #fff;
    }

    /* 有料記事カード */
    .note-item--premium {
      border-color: var(--premium);
      background: linear-gradient(0deg, var(--premium-light) 0%, var(--bg-card) 140%);
    }

    .note-item--premium .note-item-icon {
      background: var(--premium-light);
      color: var(--premium);
    }

    .note-item--premium:hover {
      border-color: var(--premium);
      background: var(--premium-light);
      box-shadow: 0 0 0 3px var(--premium-glow);
    }

    .note-item--premium:hover .note-item-icon {
      background: var(--premium);
      color: #fff;
    }

    .note-item--premium:hover .note-item-arrow {
      color: var(--premium);
    }

    .note-item-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-left: 8px;
      padding: 1px 8px;
      border-radius: 100px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.02em;
      background: var(--premium-light);
      color: var(--premium);
      border: 1px solid var(--premium);
      vertical-align: middle;
      flex-shrink: 0;
    }

    .note-item-title-row {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .note-item-title-row .note-item-title {
      margin-bottom: 0;
      flex: 1;
      min-width: 0;
    }
  </style>
</head>

  <!-- ===== MAIN ===== -->
  <main class="page-wrap">

    <!-- Page hero -->
    <div class="container">
      <div class="page-hero">
        <p class="section-label">Archive</p>
        <h1 class="section-title">note記事検索</h1>
        <p class="section-desc" style="margin-bottom:0;">
          これまで投稿したnote記事をタイトルで検索できます。表記の揺れにはある程度対応していますが、入力ミスには厳しめです。
        </p>
      </div>
    </div>

    <!-- Search -->
    <section class="section-sm">
      <div class="container search-wrap">

        <div class="search-box card">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="記事タイトルで検索（例：Bot設定 / セキュリティ）"
            autocomplete="off"
          />
          <button id="search-clear" class="search-clear" aria-label="検索をクリア">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="filter-row">
          <button class="filter-chip active" data-filter="all">すべて</button>
          <button class="filter-chip" data-filter="free">無料記事</button>
          <button class="filter-chip" data-filter="premium">
            <i class="fa-solid fa-crown" style="margin-right:4px;"></i>有料記事
          </button>
        </div>

        <div class="search-meta">
          <p id="search-count" class="search-count"></p>
        </div>

        <div id="search-results" class="note-list">
          <p class="note-loading"><i class="fa-solid fa-circle-notch fa-spin"></i> 記事を読み込み中...</p>
        </div>

      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">

      <p class="footer-copy">© 2026 ゆううゆ. All rights reserved.</p>
      <nav class="footer-links" aria-label="フッターナビゲーション">
        <a href="index.html">ホーム</a>

  <!-- Fuse.js (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>

  <!-- search logic -->
  <script>
    (function () {
      const input        = document.getElementById('search-input');
      const clearBtn     = document.getElementById('search-clear');
      const resultsEl    = document.getElementById('search-results');
      const countEl      = document.getElementById('search-count');
      const filterChips  = document.querySelectorAll('.filter-chip');

      let articles = [];
      let fuse = null;
      let currentFilter = 'all'; // 'all' | 'free' | 'premium'

      // ─────────────────────────────────────────────────────────
      // 表記揺れ対応の同義語グループ。
      // Fuse.js のあいまい検索（しきい値）だけでは「ディスコード」と
      // 「Discord」のような完全に異なる文字列の表記揺れは拾えないため、
      // 検索語に含まれる単語をグループ内の別表記に置き換えた
      // バリエーションも合わせて検索する。
      // 必要に応じて自由に追加・編集してください。
      // ─────────────────────────────────────────────────────────
      const SYNONYM_GROUPS = [
        ['discord', 'ディスコード'],
        ['bot', 'ボット'],
        ['スマホ', 'スマートフォン'],
        ['サーバー', '鯖'],
        ['なりすまし', '偽アカウント'],
        ['絵文字', 'emoji', 'スタンプ'],
        ['荒らし', 'レイド'],
      ];

      function expandQuery(query) {
        const lower = query.toLowerCase();
        const variants = new Set([query]);
        SYNONYM_GROUPS.forEach(function (group) {
          group.forEach(function (term) {
            if (lower.indexOf(term.toLowerCase()) !== -1) {
              group.forEach(function (alt) {
                if (alt !== term) {
                  const re = new RegExp(term, 'ig');
                  variants.add(query.replace(re, alt));
                }
              });
            }
          });
        });
        return Array.from(variants);
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr);
        if (isNaN(d)) return '';
        return d.getFullYear() + '.' +
               String(d.getMonth() + 1).padStart(2, '0') + '.' +
               String(d.getDate()).padStart(2, '0');
      }

      function renderResults(items) {
        if (!items.length) {
          resultsEl.innerHTML =
            '<div class="search-empty">' +
              '<i class="fa-regular fa-face-frown"></i>' +
              '一致する記事が見つかりませんでした。' +
            '</div>';
          return;
        }

        resultsEl.innerHTML = items.map(function (item) {
          const isPremium = !!item.premium;
          const cardClass = 'note-item' + (isPremium ? ' note-item--premium' : '');
          const badge = isPremium
            ? '<span class="note-item-badge"><i class="fa-solid fa-crown"></i>有料</span>'
            : '';
          return [
            '<a href="' + item.url + '" class="' + cardClass + '" target="_blank" rel="noopener">',
            '<div class="note-item-icon"><i class="fa-solid ' + (isPremium ? 'fa-crown' : 'fa-pen-nib') + '"></i></div>',
            '<div class="note-item-body">',
            '<div class="note-item-title-row">',
            '<p class="note-item-title">' + escapeHtml(item.title) + '</p>',
            badge,
            '</div>',
            '<p class="note-item-meta">' + formatDate(item.pubDate) + '</p>',
            '</div>',
            '<i class="fa-solid fa-arrow-right note-item-arrow"></i>',
            '</a>'
          ].join('');
        }).join('');
      }

      function applyFilter(list) {
        if (currentFilter === 'premium') return list.filter(function (a) { return !!a.premium; });
        if (currentFilter === 'free') return list.filter(function (a) { return !a.premium; });
        return list;
      }

      function runSearch(rawQuery) {
        const query = rawQuery.trim();
        clearBtn.classList.toggle('visible', query.length > 0);

        let items;
        if (!query) {
          items = applyFilter(articles);
          countEl.innerHTML = '<strong>' + items.length + '</strong>件の記事';
        } else {
          const variants = expandQuery(query);
          const merged = new Map();
          variants.forEach(function (v) {
            fuse.search(v).forEach(function (r) {
              const existing = merged.get(r.item.url);
              if (!existing || r.score < existing.score) merged.set(r.item.url, r);
            });
          });
          let matched = Array.from(merged.values())
            .sort(function (a, b) { return a.score - b.score; })
            .map(function (r) { return r.item; });
          items = applyFilter(matched);
          countEl.innerHTML = '<strong>' + items.length + '</strong>件 見つかりました';
        }
        renderResults(items);
      }

      fetch('articles.json')
        .then(function (res) {
          if (!res.ok) throw new Error('fetch failed');
          return res.json();
        })
        .then(function (data) {
          articles = Array.isArray(data) ? data : [];

          fuse = new Fuse(articles, {
            keys: ['title'],
            threshold: 0.1,       // タイポの許容度は厳格寄り（表記揺れは上の同義語展開で対応）
            distance: 60,
            ignoreLocation: true, // タイトル内のどこに一致しても良い
            minMatchCharLength: 2,
            includeScore: true,
          });

          runSearch('');

          input.addEventListener('input', function () {
            runSearch(input.value);
          });

          clearBtn.addEventListener('click', function () {
            input.value = '';
            input.focus();
            runSearch('');
          });

          filterChips.forEach(function (chip) {
            chip.addEventListener('click', function () {
              filterChips.forEach(function (c) { c.classList.remove('active'); });
              chip.classList.add('active');
              currentFilter = chip.dataset.filter;
              runSearch(input.value);
            });
          });
        })
        .catch(function () {
          resultsEl.innerHTML =
            '<div class="search-empty">' +
              '<i class="fa-solid fa-triangle-exclamation"></i>' +
              '記事データを取得できませんでした。<br>時間をおいて再度お試しください。' +
            '</div>';
          countEl.textContent = '';
        });
    })();
  </script>

</body>
